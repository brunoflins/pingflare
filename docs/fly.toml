# Fly.io deployment configuration for Pingflare (Node.js / Docker mode)
# Deploy with: fly launch  (first time)  |  fly deploy  (updates)
# Set secrets:  fly secrets set ADMIN_USER=... ADMIN_PASS=... JWT_SECRET=... ENCRYPTION_KEY=...

app = "pingflare"
primary_region = "iad"

[build]

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

  [http_service.concurrency]
    type = "connections"
    hard_limit = 100
    soft_limit = 80

[env]
  PORT = "3000"
  NODE_ENV = "production"
  DB_PATH = "/data/pingflare.db"

[mounts]
  source = "pingflare_data"
  destination = "/data"
  initial_size = "1gb"

[[vm]]
  memory = "256mb"
  cpu_kind = "shared"
  cpus = 1

[checks]
  [checks.health]
    grace_period = "10s"
    interval = "30s"
    method = "GET"
    path = "/api/health"
    port = 3000
    timeout = "5s"
    type = "http"
