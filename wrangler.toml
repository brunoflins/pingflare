name = "pingflare"
main = "src/index.ts"
compatibility_date = "2025-04-01"
compatibility_flags = ["nodejs_compat"]

[build]
command = "npm run build"

[assets]
binding = "ASSETS"
directory = "./frontend/build"
run_worker_first = true

[[d1_databases]]
binding = "DB"
database_name = "pingflare"
migrations_dir = "drizzle"

# External database:
#   [[hyperdrive]]
#   binding = "HYPERDRIVE"
#   id = "<your-hyperdrive-config-id>"
#   localConnectionString = "postgres://user:pass@localhost:5432/pingflare"

[triggers]
crons = [
  "* * * * *"
]

[placement]
mode = "smart"

[observability]
enabled = true
head_sampling_rate = 0.1

[observability.logs]
enabled = true
head_sampling_rate = 0.1
persist = false
invocation_logs = false